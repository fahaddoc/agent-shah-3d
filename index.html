<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Shah — Classified Portfolio</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/favicon-256.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="splash">
      <img src="/favicon-256.png" alt="Agent Shah" class="splash-img" />
      <div class="splash-tag">AGENT SHAH</div>
    </div>

    <div id="hud">
      <div class="hud-top">
        <div class="hud-block">
          <span class="hud-label">AGENT</span>
          <span class="hud-value">SHAH FAHAD</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">SECTOR</span>
          <span class="hud-value" id="sector-name">01 · BRIEFING ROOM</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">WEAPON</span>
          <span class="hud-value" id="weapon-name">PISTOL</span>
        </div>
        <button id="music-toggle" class="hud-btn" title="Mute music (M)">♪ MUSIC</button>
      </div>

      <div class="hud-bottom">
        <div class="health-wrap">
          <span class="hud-label">HP</span>
          <div class="health-bar"><div class="health-fill" id="health-fill"></div></div>
        </div>
        <div class="hud-hint" id="hud-hint">WASD to move · MOUSE to aim · CLICK to shoot · E to interact</div>
      </div>
    </div>

    <div id="briefing" class="hidden">
      <div id="briefing-body"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script async src="https://vibej.am/2026/widget.js"></script>
  </body>
</html>
